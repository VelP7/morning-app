<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Начало </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #09090b; 
        }

        .fade-transition { transition: opacity 1s ease-in-out; }
        
        .breathe-circle { 
            animation: breathe 10s ease-in-out forwards; 
        }
        
        @keyframes breathe {
            0% { transform: scale(0.8); opacity: 0.15; box-shadow: 0 0 0 0 rgba(255,255,255,0.15); }
            40% { transform: scale(1.4); opacity: 0.6; box-shadow: 0 0 35px 15px rgba(255,255,255,0.1); }
            100% { transform: scale(0.8); opacity: 0; box-shadow: 0 0 0 0 rgba(255,255,255,0); }
        }

        input:focus { outline: none; box-shadow: none; }
        
        .glass-btn {
            background: rgba(39, 39, 42, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(63, 63, 70, 0.5);
        }
    </style>
</head>
<body class="text-zinc-200 h-screen antialiased overflow-hidden selection:bg-zinc-700">

    <div class="max-w-md mx-auto h-full px-6 relative">
        
        <div id="screen-breathing" class="absolute inset-0 flex flex-col items-center justify-center z-40 fade-transition bg-[#09090b]">
            <div class="w-32 h-32 rounded-full border border-zinc-700 breathe-circle absolute"></div>
            <p id="breathing-text" class="text-lg font-light text-zinc-300 z-10 transition-opacity duration-700 tracking-widest uppercase text-sm">
                Вдох
            </p>
        </div>

        <div id="screen-affirmation" class="absolute inset-0 flex flex-col items-center justify-center px-6 z-30 opacity-0 pointer-events-none fade-transition bg-[#09090b]">
            <div class="w-full flex flex-col items-center space-y-12">
                <p id="daily-text-container" class="text-xl font-light leading-relaxed text-center text-zinc-300 w-full px-2"></p>
                
                <div class="w-full opacity-0 fade-transition" id="btn-responsibility-container">
                    <button onclick="goToAction()" class="w-full glass-btn hover:bg-zinc-800 text-zinc-300 font-light tracking-wide py-4 rounded-lg transition-all text-sm uppercase">
    Принимаю ответственность </button>
                </div>
            </div>
        </div>

        <div id="screen-action" class="absolute inset-0 flex flex-col justify-center px-6 z-20 opacity-0 pointer-events-none fade-transition bg-[#09090b]">
            <div class="flex-grow flex flex-col justify-center">
                <p id="action-prompt-text" class="text-lg font-light mb-12 text-center text-zinc-400"></p>
                <input type="text" id="action-input" placeholder="" class="w-full bg-transparent border-b border-zinc-800 focus:border-zinc-500 text-2xl pb-3 text-center text-zinc-200 transition-colors" autocomplete="off">
            </div>
            
            <div class="pb-12 w-full">
                <button onclick="finishMorning()" class="w-full bg-zinc-200 hover:bg-white text-zinc-900 font-medium py-4 rounded-lg transition-colors text-sm uppercase tracking-wide">
                    Начать день
                </button>
            </div>
        </div>

        <div id="screen-outro" class="absolute inset-0 flex flex-col items-center justify-center z-10 opacity-0 pointer-events-none fade-transition bg-[#09090b]">
            <p class="text-zinc-500 font-light tracking-widest text-sm uppercase mb-8">Намерение принято</p>
            <div class="flex flex-col items-center">
                <p class="text-4xl font-light text-zinc-200" id="streak-display">День 1</p>
                <p class="text-xl font-light text-zinc-500 mt-2 tracking-wide">начался</p>
            </div>
        </div>

    </div>

    <script>
        const journeyTexts = [
            "Я делаю то, что должен, и отпускаю то, что не могу изменить. Мой фокус - на моих усилиях, а не на результате.",
            "Суета мира бессильна, пока я не отдам ей свое внимание. Сегодня я выбираю глубину и концентрацию вместо скорости.",
            "Я не жду идеального состояния. Вдохновение - это награда за начатое действие, а не условие для него. Я начинаю прямо сейчас.",
            "Тревога питается мыслями о будущем. Я возвращаю себя в настоящее: здесь и сейчас есть только задача перед моими глазами.",
            "Ошибки не определяют мою ценность, они лишь показывают, где мне нужно стать точнее. Я разрешаю себе быть неидеальным, но продолжаю идти.",
            "Я не могу управлять ветром, но я управляю парусами. Пусть обстоятельства меняются, мое внутреннее ядро остается неподвижным.",
            "Сегодня я отказываюсь от быстрых удовольствий ради долгосрочной цели. Этот краткосрочный дискомфорт - цена моей будущей свободы.",
            "Сравнение себя с другими крадет мою силу. Мой единственный соперник сегодня - тот человек, которым я был вчера.",
            "Никто не придет, чтобы сделать мою работу за меня. Я беру полную ответственность за то место, где я нахожусь сегодня.",
            "Я отказываюсь от ожиданий быстрых аплодисментов. Мой труд имеет ценность сам по себе, я делаю его ради процесса, а не ради оценки.",
            "Моя энергия ограничена. Я обещаю не тратить ее на споры, обиды и то, что не делает меня сильнее в этот день.",
            "Любая проблема сегодня - это естественная часть пути. Я принимаю её без сопротивления и использую как топливо.",
            "Дисциплина - это не ограничение, это отсечение лишнего. Я добровольно сужаю свой выбор, чтобы получить максимальный результат.",
            "Я не верю в магию, я верю в математику усилий. Каждое маленькое действие сегодня плюсуется к моему капиталу завтра.",
            "Я не пытаюсь проломить стену головой. Если путь закрыт, я сохраняю спокойствие и ищу дверь. Упрямство - это Эго, упорство - это мудрость.",
            "У меня нет контроля над чужими словами и поступками, но моя реакция принадлежит только мне. Я выбираю тишину вместо оправданий.",
            "Сегодня я практикую искусство маленьких шагов. Мне не нужно видеть всю лестницу, чтобы подняться на одну ступеньку.",
            "Я отпускаю потребность быть всегда правым. Моя цель сегодня - найти истину и сделать дело, а не потешить свое самолюбие.",
            "Страх перед неудачей - это просто иллюзия ума. Я иду навстречу своему страху, потому что именно там спрятан мой потенциал.",
            "Я искренне благодарю за то, что имею сейчас, и искренне сделаю то, что должен сделать сегодня.",
            "Усталость - это сигнал к отдыху, а не к сдаче. Я даю себе право на паузу, чтобы потом ударить с новой силой.",
            "Мои мысли - это инструменты. Я оставляю только те, которые помогают мне строить, и без сожаления выбрасываю те, что разрушают.",
            "Я не требую от мира справедливости. Я навожу порядок там, к чему имеют доступ мои руки.",
            "Моя сила в моей уязвимости. Признать свое незнание - значит открыть разум для нового опыта. Я готов учиться сегодня.",
            "Ничто не длится вечно: ни успех, ни провал. Я сохраняю ровное отношение к победам и поражениям, продолжая делать свое дело.",
            "Сегодня я говорю «нет» всему, что не соответствует моим главным ценностям. Мое «нет» освобождает пространство для настоящего.",
            "Я перестаю бороться с реальностью и начинаю с ней танцевать. Я использую силу сопротивления среды для собственного ускорения.",
            "Каждое слово, сказанное мной сегодня, должно быть либо правдивым, либо добрым, либо полезным. Иначе я выбираю молчание.",
            "Мой разум ясен, мое тело готово, моя воля подчинена смыслу. Я полностью присутствую в сегодняшнем дне.",
            "Я - не мои мысли, я - тот, кто за ними наблюдает. Из этой точки тишины я начинаю свой день и делаю свой главный шаг."
        ];

        const actionPrompts = [
            "С каким намерением ты входишь в этот день?",
            "На чем ты сфокусируешь свое внимание сегодня?"
        ];

        let currentStreak = parseInt(localStorage.getItem('embody_streak')) || 0;
        const lastEntryDate = localStorage.getItem('embody_last_date');
        const todayDate = new Date().toDateString();
        let historyForAI = JSON.parse(localStorage.getItem('embody_history_ai')) || [];

        const textIndex = currentStreak % journeyTexts.length;
        const currentText = journeyTexts[textIndex];
        
        const promptIndex = currentStreak % 2;
        const currentPrompt = actionPrompts[promptIndex];

        const screenBreathing = document.getElementById('screen-breathing');
        const screenAffirmation = document.getElementById('screen-affirmation');
        const screenAction = document.getElementById('screen-action');
        const screenOutro = document.getElementById('screen-outro');
        
        const textContainer = document.getElementById('daily-text-container');
        const promptTextContainer = document.getElementById('action-prompt-text');
        
        const btnResponsibility = document.getElementById('btn-responsibility-container');
        const actionInput = document.getElementById('action-input');
        const streakDisplay = document.getElementById('streak-display');
        const breathingText = document.getElementById('breathing-text');

        // Переменная состояния приложения (чтобы Enter работал вовремя)
        let appState = 'breathing';

        window.onload = () => {
            textContainer.innerText = currentText;
            promptTextContainer.innerText = currentPrompt; 

            setTimeout(() => {
                breathingText.style.opacity = '0';
                setTimeout(() => {
                    breathingText.innerText = 'ВЫДОХ';
                    breathingText.style.opacity = '1';
                }, 500); 
            }, 3500);

            setTimeout(() => {
                screenBreathing.style.opacity = '0';
                setTimeout(() => {
                    screenBreathing.classList.add('hidden');
                    screenAffirmation.classList.remove('pointer-events-none');
                    screenAffirmation.style.opacity = '1';
                    
                    setTimeout(() => {
                        btnResponsibility.style.opacity = '1';
                        // Разрешаем нажимать Enter
                        appState = 'affirmation_ready';
                    }, 4000);
                }, 1000);
            }, 10000); 
        };

        function goToAction() {
            // Защита от двойных нажатий
            if (appState !== 'affirmation_ready') return;
            appState = 'action_screen';

            screenAffirmation.style.opacity = '0';
            screenAffirmation.classList.add('pointer-events-none');
            setTimeout(() => {
                screenAction.classList.remove('pointer-events-none');
                screenAction.style.opacity = '1';
                setTimeout(() => actionInput.focus(), 500);
            }, 1000);
        }

        function finishMorning() {
            const userAction = actionInput.value.trim(); 
            if (!userAction) return; 
            
            if (lastEntryDate !== todayDate) {
                currentStreak++;
                
                const aiDataPacket = {
                    date: todayDate,
                    dayOfChallenge: currentStreak,
                    philosophyText: currentText, 
                    askedQuestion: currentPrompt, 
                    userCommitment: userAction
                };
                historyForAI.push(aiDataPacket);

                localStorage.setItem('embody_streak', currentStreak);
                localStorage.setItem('embody_last_date', todayDate);
                localStorage.setItem('embody_history_ai', JSON.stringify(historyForAI));
            }

            streakDisplay.innerText = `День ${currentStreak}`;

            screenAction.style.opacity = '0';
            screenAction.classList.add('pointer-events-none');
            setTimeout(() => {
                screenOutro.classList.remove('pointer-events-none');
                screenOutro.style.opacity = '1';
            }, 1000);
        }
        
        // Глобальный слушатель клавиатуры
        document.addEventListener("keydown", function(event) {
            if (event.key === "Enter") {
                if (appState === 'affirmation_ready') {
                    // Если мы на втором экране и кнопка появилась — идем дальше
                    event.preventDefault();
                    goToAction();
                } else if (appState === 'action_screen' && document.activeElement === actionInput) {
                    // Если мы на третьем экране и вводим текст — завершаем сессию
                    event.preventDefault();
                    finishMorning();
                }
            }
        });
    </script>
</body>
</html>
